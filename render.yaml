# Render Blueprint — Mutual Fund FAQ Phase 2 API
# https://render.com/docs/blueprint-spec
#
# After merge: Dashboard → New → Blueprint → connect this repo, or
# add this repo to Render and select "Apply render.yaml".

services:
  - type: web
    name: mutual-fund-faq-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r phase-2/requirements.txt
    startCommand: python phase-2/run_phase2_ui.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
