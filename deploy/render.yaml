# Render Blueprint — Mutual Fund FAQ Phase 2 API
# https://render.com/docs/blueprint-spec
#
# This file lives under deploy/ so Vercel (repo root) does not treat the repo
# as a Python Render service. In Render: New → Blueprint → set blueprint path
# to deploy/render.yaml (or paste from this file).

services:
  - type: web
    name: mutual-fund-faq-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r phase-2/requirements.txt
    startCommand: python phase-2/run_phase2_ui.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
