name: Daily Ingestion Pipeline

on:
  schedule:
    # 09:15 IST daily
    - cron: "45 3 * * *"
  workflow_dispatch:

concurrency:
  group: phase1-daily-ingestion
  cancel-in-progress: false

jobs:
  run-phase1:
    runs-on: ubuntu-latest
    steps:
      # Avoid actions/checkout post-job: it runs `git submodule foreach` which fails if the
      # tree has a gitlink (mode 160000) without a matching .gitmodules URL.
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --no-tags --prune --depth=1 origin "${{ github.sha }}"
          git checkout --progress FETCH_HEAD

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phase-1/requirements.txt

      - name: Run ingestion pipeline (scrape -> chunk -> embed -> local index artifacts)
        run: python phase-1/run_phase1.py

      - name: Upload phase 1 reports
        uses: actions/upload-artifact@v4
        with:
          name: phase1-reports
          path: phase-1/reports/
